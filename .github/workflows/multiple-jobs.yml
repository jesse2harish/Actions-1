name: Multiple jobs

on: push

jobs:
    build_job_1: 
        runs-on: ubuntu-latest
        steps:
        - name: Install Cowsay program
          run: sudo apt-get install cowsay -y

        - name: Execute cowsay program 
          run: cowsay -f dragon "Run for the cover, I am a DRAGON!!!! HAHAHAH" >> dragon.txt

        - name: Upload dragon text file
          uses: actions/upload-artifact@v4
          with:
            name: dragon-text-file
            path: dragon.txt 

    test_job_2: 
        needs: build_job_1
        runs-on: ubuntu-latest
        steps:
        - name: Download Dragon text file
          uses: actions/download-artifact@v8
          with:
            name: dragon-text-file

        - name: Test id file exist
          run: grep -i "dragon" dragon.txt
            
    deploy_job_3: 
        needs: [test_job_2]
        runs-on: ubuntu-latest
        steps: 
        - name: Download Dragon text file
          uses: actions/download-artifact@v8
          with:
            name: dragon-text-file
                        
        - name: Read file
          run: cat dragon.txt

        - name: Echo deploying
          run: echo deploying...      
