name: Multiple jobs

on: push

jobs:
    build_job_1: 
        runs-on: ubuntu-latest
        steps:
        - name: Install Cowsay program
          run: sudo apt-get install cowsay -y

        - name: Execute cowsay program 
          run: cowsay -f dragon "Run for the cover, I am a DRAGON!!!! HAHAHAH" >> dragon.txt

        - name: Sleep for 30 sec
          run: sleep 30  

    test_job_2: 
        runs-on: ubuntu-latest
        steps:
        - name: Sleep 10 sec
          run: sleep 10

        - name: Test id file exist
          run: grep -i "dragon" dragon.txt
            
    deploy_job_3: 
        runs-on: ubuntu-latest
        steps: 
        - name: Read file
          run: cat dragon.txt

        - name: Echo deploying
          run: echo deploying...      
