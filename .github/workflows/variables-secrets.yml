name: Exploring variables and secrets

on: push

env: 
    CONTAINER_REGISTRY: docker.io
    DOCKER_USERNAME: hharisj19
    IMAGE_NAME: github-actions-nginx
    DOCKER_PASSWORD: Ma@9448932887

jobs:
    docker: 
        runs-on: ubuntu-latest
        steps:
        - name: Docker build
          run: echo docker build -t $CONTAINER_REGISTRY/$DOCKER_USERNAME/$MAGE_NAME:latest

        - name: Docker login
          run: echo docker login --username=$DOCKER_USERNAME --password=$DOCKER_PASSWORD        

        - name: docker publish
          run: echo docker push $CONTAINER_REGISTRY/$DOCKER_USERNAME/$MAGE_NAME:latest

    deploy:
        needs: docker 
        runs-on: ubuntu-latest
        steps:
        - name: Docker run
          run: echo docker run -d -p 8080:80 $CONTAINER_REGISTRY/$DOCKER_USERNAME/$MAGE_NAME:latest         